<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Етажна собственост</title>

<style>
body{
  font-family:Arial;
  margin:0;
  padding:16px;
  background:#f4f6f9;
}

h2{margin-bottom:15px;}

select,button,input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  font-size:16px;
}

button{
  background:#2f6fe0;
  color:white;
  border:none;
  border-radius:6px;
}

.buttons{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.saldo{
  font-size:20px;
  margin:20px 0;
  font-weight:bold;
}

.table-wrapper{
  overflow-x:auto;
  background:white;
  border-radius:8px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th{
  background:#f0f2f5;
}

.hidden{display:none;}

.admin-box{
  margin-top:25px;
  padding:15px;
  background:white;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>Етажна собственост</h2>

<select id="apartmentSelect">
<option value="">Избери апартамент</option>
<option>A1</option><option>A2</option><option>A3</option>
<option>A4</option><option>A5</option><option>A6</option>
<option>A7</option><option>A8</option><option>A9</option>
<option>A10</option><option>A11</option><option>A12</option>
<option>A13</option><option>A14</option><option>A15</option>
</select>

<button onclick="loadData()">Покажи</button>

<div class="buttons">
<button onclick="window.open('https://drive.google.com/drive/folders/1VBoQBo5OLOA8TVnzgc_682yLxeqVCn5X','_blank')">Фактури</button>
<button onclick="window.open('https://drive.google.com/drive/folders/1JIduP2g-OO1yWDDSl8xeft-Klvq6_HT5','_blank')">Абонамент</button>
<button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSeR2vQVxz1XH21QeUEz_iPYHDS7KaHrvpj8OgB-IFi2UVwUvA/viewform','_blank')">Изпрати съобщение</button>
<button onclick="toggleAdmin()">Админ</button>
</div>

<div class="saldo" id="saldo"></div>

<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Период</th>
<th>Асансьор</th>
<th>Абонамент</th>
<th>Осветление</th>
<th>Дължимо</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div class="admin-box hidden" id="adminBox">
<h3>Админ панел</h3>

<select id="adminApt">
<option>A1</option><option>A2</option><option>A3</option>
<option>A4</option><option>A5</option><option>A6</option>
<option>A7</option><option>A8</option><option>A9</option>
<option>A10</option><option>A11</option><option>A12</option>
<option>A13</option><option>A14</option><option>A15</option>
</select>

<input type="number" id="adminAmount" placeholder="Сума">

<button onclick="addPayment()">Добави плащане</button>
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxtgsm4rySSzLxjpaTV79ERXkqPYMJG6h8LiGNsL2QF6tHwjmu_jwWeLES76hV1YRNY/exec";

/***********************
 LOAD DATA (POST)
***********************/
async function loadData(){

  const apt=document.getElementById("apartmentSelect").value;
  if(!apt) return;

  const res=await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:new URLSearchParams({
      action:"getApartment",
      apartment:apt
    })
  });

  const data=await res.json();

  document.getElementById("saldo").innerHTML=
  "Текущо салдо: "+Number(data.saldo).toFixed(2)+" €";

  let html="";
  data.rows.forEach(r=>{
    html+="<tr>";
    html+="<td>"+r.period+"</td>";
    html+="<td>"+r.elevator+"</td>";
    html+="<td>"+r.subscription+"</td>";
    html+="<td>"+r.lighting+"</td>";
    html+="<td>"+r.due+"</td>";
    html+="</tr>";
  });

  document.getElementById("tableBody").innerHTML=html;
}

/***********************
 ADMIN CHECK
***********************/
async function toggleAdmin(){

  const res=await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:new URLSearchParams({
      action:"checkAdmin"
    })
  });

  const isAdmin=await res.json();

  if(isAdmin){
    document.getElementById("adminBox").classList.remove("hidden");
  }else{
    alert("Трябва да сте логнат с админ Google акаунта.");
  }
}

/***********************
 ADD PAYMENT
***********************/
async function addPayment(){

  const apt=document.getElementById("adminApt").value;
  const amount=document.getElementById("adminAmount").value;

  const res=await fetch(API_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/x-www-form-urlencoded"
    },
    body:new URLSearchParams({
      action:"addPayment",
      apartment:apt,
      amount:amount
    })
  });

  const data=await res.json();

  if(data.status==="OK"){
    alert("Плащането е добавено");
    loadData();
  }else{
    alert("Нямате права");
  }
}

</script>

</body>
</html>
