<!DOCTYPE html>
<html lang="bg">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Етажна собственост</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f4f8;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 15px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .header-row h1 {
      margin: 0;
    }

    .gear-btn {
      background: #7a818e;
      border: none;
      color: white;
      font-size: 20px;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .gear-btn:hover {
      background: #5f656f;
    }

    .top-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .btn {
      padding: 8px 14px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    .blue {
      background: #3b6edc;
    }

    .green {
      background: #2e9e4f;
    }

    .grey {
      background: #7a818e;
    }

    .icon-btn {
      padding: 8px 10px;
      font-size: 16px;
      line-height: 1;
    }

    select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 10px;
      background: #f0f2f6;
    }

    td {
      padding: 10px;
      border-top: 1px solid #eee;
    }

    .saldo {
      font-size: 20px;
      font-weight: bold;
    }

    .saldo-card {
      transition: background 0.4s ease;
    }

    .saldo-positive {
      background: #fde8e8;
    }

    .saldo-negative {
      background: #e6f9ec;
    }

    .saldo-zero {
      background: white;
    }

    /* ===== LOADING OVERLAY ===== */
    #loadingOverlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(242, 244, 248, 0.85);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 16px;
    }

    #loadingOverlay.active {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e0e4ec;
      border-top: 4px solid #3b6edc;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 15px;
      color: #555;
      font-weight: 500;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .fade-in {
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== ADMIN OVERLAY ===== */
    .admin-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .admin-overlay.active {
      display: flex;
    }

    .admin-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: adminSlideIn 0.3s ease-out;
    }

    @keyframes adminSlideIn {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .admin-close {
      position: absolute;
      top: 12px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #999;
      line-height: 1;
      padding: 4px;
    }

    .admin-close:hover {
      color: #333;
    }

    .admin-icon {
      text-align: center;
      font-size: 40px;
      margin-bottom: 8px;
    }

    .admin-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      color: #1a1a2e;
    }

    .admin-subtitle {
      text-align: center;
      color: #777;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .admin-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
      margin-top: 14px;
    }

    .admin-input {
      width: 100%;
      padding: 11px 14px;
      font-size: 15px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
      background: #fafbfc;
    }

    .admin-input:focus {
      border-color: #3b6edc;
      background: #fff;
    }

    .admin-btn {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s, transform 0.1s;
    }

    .admin-btn:active {
      transform: scale(0.98);
    }

    .admin-btn.primary {
      background: #3b6edc;
      color: white;
    }

    .admin-btn.primary:hover {
      background: #2f5bb8;
    }

    .admin-btn.secondary {
      background: #2e9e4f;
      color: white;
    }

    .admin-btn.secondary:hover {
      background: #258a42;
    }

    .admin-btn.orange {
      background: #e67e22;
      color: white;
    }

    .admin-btn.orange:hover {
      background: #cf6d17;
    }

    .admin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .admin-divider {
      height: 1px;
      background: #e8e8e8;
      margin: 24px 0;
    }

    .admin-section h3 {
      font-size: 16px;
      margin: 0 0 4px 0;
      color: #1a1a2e;
    }

    .admin-error {
      color: #d32f2f;
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
      min-height: 18px;
    }

    .admin-current {
      margin-top: 10px;
      padding: 9px 12px;
      background: #f0f4ff;
      border-radius: 6px;
      font-size: 13px;
      color: #444;
    }

    .admin-current span {
      font-weight: 600;
      color: #3b6edc;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      z-index: 300;
      transition: bottom 0.35s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      max-width: 90vw;
      text-align: center;
      word-wrap: break-word;
    }

    .toast.show {
      bottom: 30px;
    }

    .toast.success {
      background: #2e9e4f;
    }

    .toast.error {
      background: #d32f2f;
    }

    .toast.warning {
      background: #e67e22;
    }

    /* ===== MOBILE ===== */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 22px;
      }

      .gear-btn {
        font-size: 18px;
        width: 34px;
        height: 34px;
      }

      .admin-overlay {
        padding: 10px;
        align-items: flex-start;
        padding-top: 20px;
      }

      .admin-card {
        padding: 20px 16px;
        max-width: 100%;
        max-height: 85vh;
        border-radius: 12px;
      }

      .admin-title {
        font-size: 19px;
      }

      .admin-input {
        padding: 12px;
        font-size: 16px;
        /* prevents iOS zoom on focus */
      }

      .admin-btn {
        padding: 14px;
        font-size: 16px;
      }

      .admin-section h3 {
        font-size: 15px;
      }

      .admin-label {
        font-size: 12px;
      }

      th,
      td {
        padding: 6px 4px;
        font-size: 14px;
      }

      .saldo {
        font-size: 18px;
      }

      .btn {
        font-size: 15px;
        padding: 9px 12px;
      }

      .toast {
        font-size: 13px;
        padding: 10px 16px;
        max-width: 92vw;
      }
    }
  </style>
</head>

<body>

  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Зареждане на данни...</div>
  </div>

  <!-- ADMIN OVERLAY -->
  <div id="adminOverlay" class="admin-overlay" onclick="if(event.target===this)closeAdmin()">

    <!-- PIN Screen -->
    <div class="admin-card" id="pinCard">
      <button class="admin-close" onclick="closeAdmin()">✕</button>
      <div class="admin-icon">🔐</div>
      <div class="admin-title">Админ панел</div>
      <div class="admin-subtitle">Въведете PIN за достъп</div>
      <input type="password" id="pinInput" class="admin-input" placeholder="PIN код" maxlength="10"
        onkeydown="if(event.key==='Enter')verifyPin()">
      <div id="pinError" class="admin-error"></div>
      <button class="admin-btn primary" onclick="verifyPin()">Вход</button>
    </div>

    <!-- Admin Content (hidden until PIN ok) -->
    <div class="admin-card" id="adminCard" style="display:none">
      <button class="admin-close" onclick="closeAdmin()">✕</button>
      <div class="admin-title">⚙️ Админ панел</div>

      <!-- Payment Section -->
      <div class="admin-section">
        <h3>💰 Добавяне на плащане</h3>

        <label class="admin-label">Апартамент</label>
        <select id="adminApt" class="admin-input"></select>

        <label class="admin-label">Период (MM.YYYY)</label>
        <input type="text" id="adminPeriod" class="admin-input" placeholder="03.2026">

        <label class="admin-label">Сума</label>
        <input type="number" id="adminAmount" class="admin-input" placeholder="0.00" step="0.01">

        <button class="admin-btn primary" id="payBtn" onclick="submitPayment()">
          Добави плащане
        </button>
      </div>

      <div class="admin-divider"></div>

      <!-- Charges Section -->
      <div class="admin-section">
        <h3>📋 Начисления (Асансьор / Абонамент / Осветление)</h3>

        <label class="admin-label">Период (MM.YYYY)</label>
        <input type="text" id="chargesPeriod" class="admin-input" placeholder="03.2026">

        <label class="admin-label">Асансьор</label>
        <input type="number" id="chargesElevator" class="admin-input" placeholder="оставете празно ако няма"
          step="0.01">

        <label class="admin-label">Абонамент</label>
        <input type="number" id="chargesSubscription" class="admin-input" placeholder="оставете празно ако няма"
          step="0.01">

        <label class="admin-label">Осветление</label>
        <input type="number" id="chargesLight" class="admin-input" placeholder="оставете празно ако няма" step="0.01">

        <button class="admin-btn orange" id="chargesBtn" onclick="submitCharges()">
          Запиши начисления
        </button>
      </div>

      <div class="admin-divider"></div>

      <!-- Email Section -->
      <div class="admin-section">
        <h3>✉️ Имейл на апартамент</h3>

        <label class="admin-label">Апартамент</label>
        <select id="adminEmailApt" class="admin-input" onchange="loadCurrentEmail()"></select>

        <div id="currentEmailBox" class="admin-current" style="display:none">
          Текущ имейл: <span id="currentEmail">—</span>
        </div>

        <label class="admin-label">Нов имейл</label>
        <input type="email" id="adminEmail" class="admin-input" placeholder="email@example.com">

        <button class="admin-btn secondary" id="emailBtn" onclick="submitEmail()">
          Запази имейл
        </button>
      </div>

      <div class="admin-divider"></div>

      <!-- MASTER Link -->
      <a href="https://docs.google.com/spreadsheets/d/1lPVIF_Hj4eTEoatc9dT0TOhaSwX7wknCqOU84vOGt78/edit?gid=769791497#gid=769791497"
        target="_blank" style="text-decoration:none;">
        <button class="admin-btn primary" style="background:#555;" type="button">
          📊 MASTER
        </button>
      </a>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <div class="header-row">
    <h1>Етажна собственост</h1>
    <button class="gear-btn" onclick="openAdmin()" title="Админ панел">⚙️</button>
  </div>

  <div class="top-buttons">
    <a href="https://drive.google.com/drive/folders/1VBoQBo5OLOA8TVnzgc_682yLxeqVCn5X?usp=sharing" target="_blank">
      <button class="btn blue">Ф-ри ел.</button>
    </a>

    <a href="https://drive.google.com/drive/folders/1JIduP2g-OO1yWDDSl8xeft-Klvq6_HT5?usp=drive_link" target="_blank">
      <button class="btn blue">Абонамент</button>
    </a>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeR2vQVxz1XH21QeUEz_iPYHDS7KaHrvpj8OgB-IFi2UVwUvA/viewform"
      target="_blank">
      <button class="btn blue icon-btn" title="Изпрати съобщение">✉️</button>
    </a>
  </div>

  <select id="apartmentSelect">
    <option value="">Избери апартамент</option>
  </select>

  <div class="card saldo-card" id="saldoCard">
    <div class="saldo">Текущо салдо: <span id="saldo">-</span></div>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Период</th>
          <th>Асансьор</th>
          <th>Абонамент</th>
          <th>Осветление</th>
          <th>Дължимо</th>
          <th>Платено</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxtgsm4rySSzLxjpaTV79ERXkqPYMJG6h8LiGNsL2QF6tHwjmu_jwWeLES76hV1YRNY/exec";

    const select = document.getElementById("apartmentSelect");
    const saldoEl = document.getElementById("saldo");
    const saldoCard = document.getElementById("saldoCard");
    const tableBody = document.getElementById("tableBody");
    const loadingOverlay = document.getElementById("loadingOverlay");

    /* ===== LOADING HELPERS ===== */
    function showLoading() { loadingOverlay.classList.add("active"); }
    function hideLoading() { loadingOverlay.classList.remove("active"); }

    /* ===== ЗАРЕЖДА АПАРТАМЕНТИТЕ ===== */
    let apartmentList = [];

    async function loadApartments() {
      const res = await fetch(API_URL + "?list=apartments");
      const list = await res.json();
      apartmentList = list;

      list.forEach(a => {
        const opt = document.createElement("option");
        opt.value = a;
        opt.textContent = a;
        select.appendChild(opt);
      });
    }

    loadApartments();

    /* ===== ПРИ ИЗБОР ===== */
    select.addEventListener("change", () => {
      if (select.value) loadData(select.value);
    });

    /* ===== ЗАРЕЖДА ДАННИ ===== */
    async function loadData(apartment) {
      showLoading();
      try {
        const res = await fetch(API_URL + "?apartment=" + apartment);
        const data = await res.json();
        render(data);
      } catch (err) {
        tableBody.innerHTML = "<tr><td colspan='6' style='text-align:center;color:#c00;'>Грешка при зареждане.</td></tr>";
        saldoEl.textContent = "-";
      } finally {
        hideLoading();
      }
    }

    /* ===== РЕНДЕР ===== */
    function render(data) {
      tableBody.innerHTML = "";
      const saldoVal = Number(data.saldo || 0);
      saldoEl.textContent = saldoVal.toFixed(2) + " €";

      saldoCard.classList.remove("saldo-positive", "saldo-negative", "saldo-zero");
      if (saldoVal > 0) saldoCard.classList.add("saldo-positive");
      else if (saldoVal < 0) saldoCard.classList.add("saldo-negative");
      else saldoCard.classList.add("saldo-zero");

      (data.periods || []).forEach((r, idx) => {
        const tr = document.createElement("tr");
        tr.classList.add("fade-in");
        tr.style.animationDelay = (idx * 0.04) + "s";
        tr.innerHTML = `
          <td>${r.period}</td>
          <td>${Number(r.elevator).toFixed(2)}</td>
          <td>${Number(r.subscription).toFixed(2)}</td>
          <td>${Number(r.light).toFixed(2)}</td>
          <td>${Number(r.due).toFixed(2)}</td>
          <td>${Number(r.paid).toFixed(2)}</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    /* =============================================================
       ADMIN PANEL
       ============================================================= */
    let adminPin = "";
    const MAX_ATTEMPTS = 3;
    const LOCKOUT_MS = 5 * 60 * 1000; // 5 минути

    function isLockedOut() {
      const lockUntil = Number(sessionStorage.getItem("pinLockUntil") || 0);
      if (lockUntil && Date.now() < lockUntil) {
        const secs = Math.ceil((lockUntil - Date.now()) / 1000);
        const mins = Math.floor(secs / 60);
        const s = secs % 60;
        return mins + ":" + String(s).padStart(2, "0");
      }
      if (lockUntil) {
        sessionStorage.removeItem("pinLockUntil");
        sessionStorage.removeItem("pinAttempts");
      }
      return false;
    }

    function openAdmin() {
      document.getElementById("adminOverlay").classList.add("active");
      const saved = sessionStorage.getItem("adminPin");
      if (saved) {
        adminPin = saved;
        showAdminContent();
      } else {
        document.getElementById("pinCard").style.display = "block";
        document.getElementById("adminCard").style.display = "none";
        document.getElementById("pinInput").value = "";
        const remaining = isLockedOut();
        if (remaining) {
          document.getElementById("pinError").textContent = "Блокиран. Опитайте след " + remaining;
          document.getElementById("pinInput").disabled = true;
        } else {
          document.getElementById("pinError").textContent = "";
          document.getElementById("pinInput").disabled = false;
          setTimeout(() => document.getElementById("pinInput").focus(), 100);
        }
      }
    }

    function closeAdmin() {
      document.getElementById("adminOverlay").classList.remove("active");
    }

    async function verifyPin() {
      const remaining = isLockedOut();
      if (remaining) {
        document.getElementById("pinError").textContent = "Блокиран. Опитайте след " + remaining;
        return;
      }

      const pin = document.getElementById("pinInput").value.trim();
      if (!pin) return;

      try {
        const res = await fetch(API_URL + "?action=verifyPin&pin=" + encodeURIComponent(pin));
        const data = await res.json();
        if (data.success) {
          adminPin = pin;
          sessionStorage.setItem("adminPin", pin);
          sessionStorage.removeItem("pinAttempts");
          sessionStorage.removeItem("pinLockUntil");
          showAdminContent();
        } else {
          let attempts = Number(sessionStorage.getItem("pinAttempts") || 0) + 1;
          sessionStorage.setItem("pinAttempts", attempts);

          if (attempts >= MAX_ATTEMPTS) {
            sessionStorage.setItem("pinLockUntil", Date.now() + LOCKOUT_MS);
            document.getElementById("pinError").textContent = "3 грешни опита. Блокиран за 5 минути.";
            document.getElementById("pinInput").disabled = true;
          } else {
            document.getElementById("pinError").textContent =
              "Грешен PIN (" + attempts + "/" + MAX_ATTEMPTS + ")";
          }
        }
      } catch (e) {
        document.getElementById("pinError").textContent = "Грешка при връзка със сървъра";
      }
    }

    function showAdminContent() {
      document.getElementById("pinCard").style.display = "none";
      document.getElementById("adminCard").style.display = "block";
      populateAdminDropdowns();

      // Pre-fill period with current month
      const now = new Date();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const yyyy = now.getFullYear();
      document.getElementById("adminPeriod").value = mm + "." + yyyy;
      document.getElementById("chargesPeriod").value = mm + "." + yyyy;
    }

    function populateAdminDropdowns() {
      const aptSel = document.getElementById("adminApt");
      const emailSel = document.getElementById("adminEmailApt");

      if (aptSel.options.length <= 1) {
        aptSel.innerHTML = '<option value="">Избери апартамент</option>';
        emailSel.innerHTML = '<option value="">Избери апартамент</option>';

        apartmentList.forEach(a => {
          const o1 = new Option(a, a);
          const o2 = new Option(a, a);
          aptSel.appendChild(o1);
          emailSel.appendChild(o2);
        });
      }
    }

    /* --- PAYMENT --- */
    async function submitPayment() {
      const apt = document.getElementById("adminApt").value;
      const period = document.getElementById("adminPeriod").value.trim();
      const amount = document.getElementById("adminAmount").value.trim();

      if (!apt || !period || !amount) {
        showToast("Попълнете всички полета", "error");
        return;
      }

      if (!/^\d{2}\.\d{4}$/.test(period)) {
        showToast("Периодът трябва да е MM.YYYY", "error");
        return;
      }

      const btn = document.getElementById("payBtn");
      btn.disabled = true;
      btn.textContent = "Записване...";

      try {
        const url = API_URL + "?action=addPayment&pin=" + encodeURIComponent(adminPin)
          + "&apartment=" + encodeURIComponent(apt)
          + "&period=" + encodeURIComponent(period)
          + "&amount=" + encodeURIComponent(amount);

        const res = await fetch(url);
        const data = await res.json();

        if (data.success) {
          if (data.emailError) {
            showToast("✅ Записано, но имейлът не е изпратен", "warning");
          } else {
            showToast("✅ Записано: " + apt + " → " + period + " → " + amount, "success");
          }
          document.getElementById("adminAmount").value = "";
          if (select.value === apt) loadData(apt);
        } else {
          showToast(data.error || "Грешка при записване", "error");
        }
      } catch (e) {
        showToast("Грешка при връзка със сървъра", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Добави плащане";
      }
    }

    /* --- EMAIL --- */
    async function loadCurrentEmail() {
      const apt = document.getElementById("adminEmailApt").value;
      const box = document.getElementById("currentEmailBox");
      const span = document.getElementById("currentEmail");

      if (!apt) { box.style.display = "none"; return; }

      try {
        const res = await fetch(API_URL + "?action=getEmail&apartment=" + encodeURIComponent(apt));
        const data = await res.json();
        if (data.email) {
          span.textContent = data.email;
          box.style.display = "block";
        } else {
          span.textContent = "не е зададен";
          box.style.display = "block";
        }
      } catch (e) {
        box.style.display = "none";
      }
    }

    async function submitEmail() {
      const apt = document.getElementById("adminEmailApt").value;
      const email = document.getElementById("adminEmail").value.trim();

      if (!apt || !email) {
        showToast("Попълнете апартамент и имейл", "error");
        return;
      }

      const btn = document.getElementById("emailBtn");
      btn.disabled = true;
      btn.textContent = "Записване...";

      try {
        const url = API_URL + "?action=addEmail&pin=" + encodeURIComponent(adminPin)
          + "&apartment=" + encodeURIComponent(apt)
          + "&email=" + encodeURIComponent(email);

        const res = await fetch(url);
        const data = await res.json();

        if (data.success) {
          showToast("✅ " + (data.updated ? "Имейлът е обновен" : "Имейлът е добавен"), "success");
          document.getElementById("adminEmail").value = "";
          loadCurrentEmail();
        } else {
          showToast(data.error || "Грешка при записване", "error");
        }
      } catch (e) {
        showToast("Грешка при връзка със сървъра", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Запази имейл";
      }
    }

    /* --- CHARGES --- */
    async function submitCharges() {
      const period = document.getElementById("chargesPeriod").value.trim();
      const elevator = document.getElementById("chargesElevator").value.trim();
      const subscription = document.getElementById("chargesSubscription").value.trim();
      const light = document.getElementById("chargesLight").value.trim();

      if (!period) {
        showToast("Въведете период", "error");
        return;
      }

      if (!/^\d{2}\.\d{4}$/.test(period)) {
        showToast("Периодът трябва да е MM.YYYY", "error");
        return;
      }

      if (!elevator && !subscription && !light) {
        showToast("Въведете поне една сума", "error");
        return;
      }

      const btn = document.getElementById("chargesBtn");
      btn.disabled = true;
      btn.textContent = "Записване...";

      try {
        let url = API_URL + "?action=addCharges&pin=" + encodeURIComponent(adminPin)
          + "&period=" + encodeURIComponent(period);
        if (elevator) url += "&elevator=" + encodeURIComponent(elevator);
        if (subscription) url += "&subscription=" + encodeURIComponent(subscription);
        if (light) url += "&light=" + encodeURIComponent(light);

        const res = await fetch(url);
        const data = await res.json();

        if (data.success) {
          showToast("✅ " + data.message, data.hasSkipped ? "warning" : "success");
          document.getElementById("chargesElevator").value = "";
          document.getElementById("chargesSubscription").value = "";
          document.getElementById("chargesLight").value = "";
        } else if (data.message && data.hasSkipped) {
          showToast(data.message, "warning");
        } else {
          showToast(data.error || "Грешка при записване", "error");
        }
      } catch (e) {
        showToast("Грешка при връзка със сървъра", "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Запиши начисления";
      }
    }

    /* --- TOAST --- */
    let toastTimeout;
    function showToast(msg, type) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.className = "toast " + type;
      clearTimeout(toastTimeout);
      requestAnimationFrame(() => { t.classList.add("show"); });
      toastTimeout = setTimeout(() => { t.classList.remove("show"); }, 3500);
    }
  </script>

</body>

</html>
