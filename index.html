<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Етажна собственост</title>

<style>
body{font-family:Arial;margin:0;padding:14px;background:#f4f6f9;}
h2{margin:0 0 12px 0;}

button{padding:8px 10px;font-size:13px;border:none;border-radius:6px;
background:#2f6fe0;color:white;cursor:pointer;}

select,input{width:100%;padding:8px;font-size:14px;margin-bottom:8px;}

.saldo{font-size:16px;font-weight:bold;margin:12px 0;}

table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:6px;border-bottom:1px solid #eee;text-align:center;font-size:13px;}
th{background:#f0f2f5;}
</style>
</head>

<body>

<h2>Етажна собственост</h2>

<select id="apartment" onchange="loadData()">
  <option value="">Избери апартамент</option>
  <option>A1</option><option>A2</option><option>A3</option>
  <option>A4</option><option>A5</option><option>A6</option>
  <option>A7</option><option>A8</option><option>A9</option>
  <option>A10</option><option>A11</option><option>A12</option>
  <option>A13</option><option>A14</option><option>A15</option>
</select>

<div class="saldo" id="saldoBox"></div>

<table>
<thead>
<tr>
  <th>Период</th>
  <th>Асансьор</th>
  <th>Абонамент</th>
  <th>Осветление</th>
  <th>Дължимо</th>
  <th>Платено</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<hr>

<h3>Добави плащане</h3>

<select id="adminApartment">
  <option>A1</option><option>A2</option><option>A3</option>
  <option>A4</option><option>A5</option><option>A6</option>
  <option>A7</option><option>A8</option><option>A9</option>
  <option>A10</option><option>A11</option><option>A12</option>
  <option>A13</option><option>A14</option><option>A15</option>
</select>

<select id="adminPeriod"></select>

<input type="number" id="adminAmount" step="0.01">

<button onclick="addPayment()">Добави плащане</button>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxtgsm4rySSzLxjpaTV79ERXkqPYMJG6h8LiGNsL2QF6tHwjmu_jwWeLES76hV1YRNY/exec";

async function postJSON(payload){
  const res = await fetch(API_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(payload)
  });
  return await res.json();
}

async function loadData(){
  const apartment = document.getElementById("apartment").value;
  if(!apartment)return;

  const data = await postJSON({
    action:"getApartmentData",
    apartment
  });

  document.getElementById("saldoBox").innerHTML =
    "Текущо салдо: " + Number(data.saldo).toFixed(2) + " €";

  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = "";

  data.periods.forEach(row=>{
    tbody.innerHTML += `
<tr>
<td>${row.period}</td>
<td>${row.elevator.toFixed(2)}</td>
<td>${row.subscription.toFixed(2)}</td>
<td>${row.light.toFixed(2)}</td>
<td>${row.due.toFixed(2)}</td>
<td>${row.paid.toFixed(2)}</td>
</tr>`;
  });
}

async function loadPeriods(){
  const periods = await postJSON({action:"getPeriods"});
  const select = document.getElementById("adminPeriod");
  select.innerHTML="";
  periods.forEach(p=>{
    select.innerHTML+=`<option>${p}</option>`;
  });
}

async function addPayment(){

  const apartment = document.getElementById("adminApartment").value;
  const period = document.getElementById("adminPeriod").value;
  const amount = document.getElementById("adminAmount").value;

  const result = await postJSON({
    action:"addPayment",
    apartment,
    period,
    amount
  });

  alert(result.message);
  loadData();
}

loadPeriods();

</script>
</body>
</html>
